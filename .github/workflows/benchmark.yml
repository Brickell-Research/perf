name: Benchmark Regression Check

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Caffeine version to benchmark (e.g., 4.5.1). Leave empty for latest."
        required: false
        type: string

jobs:
  benchmark:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install hyperfine brickell-research/caffeine/cvm

      - name: Install caffeine
        run: |
          cvm install ${{ inputs.version || 'latest' }}
          echo "$HOME/.cvm/current" >> $GITHUB_PATH

      - name: Benchmark
        run: make ci-check

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results/

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Benchmark Results\n\n';
            for (const f of ['complexity.md', 'scaling.md']) {
              const p = `results/${f}`;
              if (fs.existsSync(p))
                body += `### ${f.replace('.md','')}\n${fs.readFileSync(p,'utf8')}\n\n`;
            }
            if (body.length > 30)
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
